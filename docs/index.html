<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jojo 的技术空间</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">
  <link href="//fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <base href="https://afine907.github.io/">
  <style>
    :root {
      --theme-color: #667eea;
      --theme-color-dark: #764ba2;
      --text-color: #2c3e50;
      --bg-color: #f8fafc;
    }
    
    * {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    /* 封面样式 */
    section.cover {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
      min-height: 100vh;
    }
    
    section.cover .cover-main {
      padding: 0 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    
    /* 头像 */
    section.cover .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    /* 标题 */
    section.cover h1 {
      font-size: 3.5rem !important;
      font-weight: 700 !important;
      color: #fff !important;
      margin-bottom: 15px !important;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    
    section.cover h1 span {
      background: linear-gradient(90deg, #fff 0%, #ffd700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* 副标题 */
    section.cover blockquote {
      font-size: 1.3rem !important;
      color: rgba(255,255,255,0.9) !important;
      border: none !important;
      margin: 0 0 30px !important;
      padding: 0 !important;
    }
    
    /* 社交链接 */
    section.cover .social-links {
      margin: 25px 0;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    
    section.cover .social-links a {
      color: rgba(255,255,255,0.8);
      font-size: 28px;
      transition: all 0.3s ease;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    section.cover .social-links a:hover {
      color: #fff;
      background: rgba(255,255,255,0.25);
      transform: translateY(-3px);
    }
    
    /* 按钮 */
    section.cover .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 30px;
    }
    
    section.cover .md-button {
      background: rgba(255,255,255,0.15) !important;
      border: 2px solid rgba(255,255,255,0.4) !important;
      color: #fff !important;
      padding: 12px 35px !important;
      border-radius: 30px !important;
      font-weight: 500 !important;
      font-size: 1rem !important;
      transition: all 0.3s ease !important;
      backdrop-filter: blur(10px);
    }
    
    section.cover .md-button:hover {
      background: rgba(255,255,255,0.25) !important;
      border-color: rgba(255,255,255,0.6) !important;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }
    
    /* 统计数字 */
    section.cover .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    
    section.cover .stat-item {
      text-align: center;
      color: rgba(255,255,255,0.9);
    }
    
    section.cover .stat-number {
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
    }
    
    section.cover .stat-label {
      font-size: 0.9rem;
      opacity: 0.8;
    }
    
    /* 侧边栏 */
    .sidebar {
      background: linear-gradient(180deg, #f8fafc 0%, #fff 100%) !important;
      border-right: 1px solid #e2e8f0 !important;
    }
    
    .sidebar-nav > ul > li > p {
      font-weight: 700;
      font-size: 1rem;
      color: #667eea;
      margin-top: 20px;
    }
    
    .sidebar ul li a {
      color: #4a5568;
      font-size: 14px;
      padding: 8px 15px;
      border-radius: 8px;
      transition: all 0.2s ease;
    }
    
    .sidebar ul li a:hover {
      background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
      color: #667eea;
    }
    
    .sidebar ul li.active > a {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    
    /* 内容区 */
    .content {
      padding: 30px 50px;
    }
    
    .markdown-section h1 {
      color: #2d3748;
      border-bottom: 3px solid;
      border-image: linear-gradient(90deg, #667eea 0%, #764ba2 100%) 1;
      padding-bottom: 15px;
    }
    
    .markdown-section h2 {
      color: #4a5568;
      margin-top: 40px;
      position: relative;
      padding-left: 15px;
    }
    
    .markdown-section h2::before {
      content: '';
      position: absolute;
      left: 0;
      top: 5px;
      bottom: 5px;
      width: 4px;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      border-radius: 2px;
    }
    
    .markdown-section a {
      color: #667eea;
      text-decoration: none;
      border-bottom: 1px dashed #667eea;
    }
    
    .markdown-section a:hover {
      color: #764ba2;
      border-color: #764ba2;
    }
    
    /* 代码块 */
    .markdown-section pre {
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .markdown-section code {
      background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
      padding: 3px 8px;
      border-radius: 4px;
      color: #667eea;
    }
    
    /* 引用块 */
    .markdown-section blockquote {
      border-left: 4px solid #667eea;
      background: linear-gradient(90deg, rgba(102,126,234,0.08) 0%, transparent 100%);
      padding: 15px 20px;
      border-radius: 0 8px 8px 0;
    }
    
    /* 移动端适配 */
    @media (max-width: 768px) {
      section.cover h1 {
        font-size: 2.5rem !important;
      }
      
      section.cover .stats {
        gap: 20px;
      }
      
      section.cover .stat-number {
        font-size: 1.8rem;
      }
      
      section.cover .avatar {
        width: 100px;
        height: 100px;
        font-size: 40px;
      }
      
      .content {
        padding: 20px;
      }
    }
    
    /* 滚动条 */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      border-radius: 4px;
    }
    
    /* 文章卡片效果 */
    .markdown-section ul {
      list-style: none;
      padding-left: 0;
    }
    
    .markdown-section ul li {
      position: relative;
      padding-left: 25px;
      margin-bottom: 12px;
    }
    
    .markdown-section ul li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: #667eea;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'jojo 的技术空间',
      nameLink: '#/',
      repo: 'https://github.com/afine907',
      loadSidebar: true,
      subMaxLevel: 3,
      coverpage: true,
      auto2top: true,
      homepage: 'README.md',
      search: {
        maxLayer: 2,
        paths: 'auto',
        placeholder: '搜索文章',
        noData: '没有找到相关内容',
        depth: 6
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制到剪贴板'
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true
      },
      plugins: [
        function(hook, vm) {
          hook.ready(function() {
            // 添加社交链接
            const coverMain = document.querySelector('.cover-main');
            if (coverMain && !document.querySelector('.social-links')) {
              const socialLinks = document.createElement('div');
              socialLinks.className = 'social-links';
              socialLinks.innerHTML = `
                <a href="https://github.com/afine907" target="_blank" title="GitHub">
                  <i class="fab fa-github"></i>
                </a>
                <a href="mailto:afine907@gmail.com" title="Email">
                  <i class="fas fa-envelope"></i>
                </a>
              `;
              coverMain.insertBefore(socialLinks, coverMain.querySelector('.buttons'));
            }
            
            // 添加统计数字
            if (coverMain && !document.querySelector('.stats')) {
              const stats = document.createElement('div');
              stats.className = 'stats';
              stats.innerHTML = `
                <div class="stat-item">
                  <div class="stat-number">12+</div>
                  <div class="stat-label">技术文章</div>
                </div>
                <div class="stat-item">
                  <div class="stat-number">AI</div>
                  <div class="stat-label">核心领域</div>
                </div>
                <div class="stat-item">
                  <div class="stat-number">∞</div>
                  <div class="stat-label">持续更新</div>
                </div>
              `;
              coverMain.appendChild(stats);
            }
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
</body>
</html>
